[package]
name = "narashi"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "多言語埋め込みで類似テキストを検出し、より汎用的な表記に統合して表記ゆれを解消するライブラリ・CLI"
repository = "https://github.com/Mokuichi147/narashi"
readme = "README.md"
keywords = ["nlp", "embeddings", "similarity", "deduplication", "fuzzy-matching"]
categories = ["text-processing", "command-line-utilities"]

[dependencies]
fastembed = "4"
tokenizers = { version = "0.20", default-features = false, features = ["http", "onig"] }
anyhow = "1"
clap = { version = "4", features = ["derive", "env"] }
hf-hub = "0.3"
