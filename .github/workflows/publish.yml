# crates.io への公開ワークフロー(タグ駆動)
#
# `v<バージョン>` 形式のタグ(例: v0.2.0)を push すると、タグと Cargo.toml の
# バージョン一致を検証し、テストを実行したうえで `cargo publish` を行う。
#
# 事前準備: リポジトリの Settings > Secrets に `CARGO_REGISTRY_TOKEN`
#           (crates.io の API トークン)を登録しておくこと。
#
# 公開手順の例:
#   1. Cargo.toml の version を更新してコミット・push
#   2. git tag v0.2.0 && git push origin v0.2.0
name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::タグ v$tag が Cargo.toml の version $crate と一致しません"
            exit 1
          fi

      - name: Run tests
        run: cargo test --locked

      - name: Publish to crates.io
        run: cargo publish --locked --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
